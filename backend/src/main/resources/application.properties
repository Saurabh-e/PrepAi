# Application Configuration
spring.application.name=ai-interview-platform
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ai_interview_platform}

spring.data.mongodb.database=ai_interview_platform
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-minimum-256-bits-long-for-production-use}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# File Storage Configuration
file.upload.dir=${FILE_UPLOAD_DIR:uploads}
file.upload.resumes.dir=${file.upload.dir}/resumes
file.upload.profiles.dir=${file.upload.dir}/profile-images

# File Storage Configuration (Local Storage - similar to Multer)
file.upload-dir=uploads
file.base-url=${FILE_BASE_URL:http://localhost:8080/uploads}
file.max-size=10485760

# Groq API Configuration
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.max.tokens=2048
groq.temperature=0.7



# CORS Configuration
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,https://*.vercel.app}

# Logging Configuration
logging.level.root=INFO
logging.level.com.interview=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/ai-interview-platform.log

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
